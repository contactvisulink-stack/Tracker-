::-webkit-scrollbar{width:0}
button{-webkit-tap-highlight-color:transparent}
.glass{backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.09);border-radius:18px}
.section{max-width:430px;margin:0 auto;padding:0 16px}
.nav-wrap{position:fixed;bottom:0;left:0;right:0;z-index:100;padding:0 10px calc(10px + env(safe-area-inset-bottom))}
.nav-inner{display:flex;gap:3px;background:rgba(6,6,16,.95);backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,.08);border-radius:18px;padding:5px}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:7px 2px;border-radius:12px;border:none;background:transparent;color:rgba(240,236,228,.28);font-family:'Syne',sans-serif;font-size:7.5px;font-weight:700;letter-spacing:.8px;cursor:pointer;transition:all .2s}
.nb .ic{font-size:15px;line-height:1}
.nb.on{background:rgba(240,165,0,.14);color:#f0a500}
.crow{display:flex;align-items:center;gap:14px;padding:11px 0;border-bottom:1px solid rgba(255,255,255,.07)}
.crow:last-child{border-bottom:none}
.cbox{width:22px;height:22px;border-radius:7px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s}
.slabel{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.slabel .si{font-size:14px}
.slabel .st{font-family:'Syne',sans-serif;font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:rgba(240,236,228,.36)}
.slabel .sr{margin-left:auto;font-family:'Syne',sans-serif;font-size:11px;font-weight:700;color:#f0a500}
.ex-img{width:100%;height:160px;object-fit:cover;border-radius:12px;margin-bottom:14px;background:rgba(255,255,255,.05)}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(240,165,0,0)}50%{box-shadow:0 0 16px 4px rgba(240,165,0,.28)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes blob{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(16px,-10px) scale(1.03)}66%{transform:translate(-8px,7px) scale(.97)}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
.fade{animation:fadeUp .35s ease both}
.spin-el{animation:spin .8s linear infinite}
</style>

const GOAL=76,START=50,KCAL=3000;

const PROG=[
  {day:"A",label:"Poitrine & Triceps",color:A,emoji:"🫁",
   exs:[
    {id:"bp",name:"Développé couché",sets:4,reps:"8-10",rest:"90s",muscle:"Pectoraux · Deltoïdes ant. · Triceps",

    {id:"dbrow",name:"Rowing haltère unilatéral",sets:3,reps:"10-12",rest:"60s",muscle:"Grand dorsal · Biceps · Rhomboïdes",

const LS={
  get:(k,fb)=>{try{const s=localStorage.getItem(k);return s?JSON.parse(s):fb;}catch{return fb;}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}},
};
const K={d:"id_",kc:"ik_",wt:"iwt",chat:"ich",wrk:"iw_",ak:"iak"};
const todayKey=()=>new Date().toISOString().split("T")[0];
const emptyDay=()=>({meals:{},water:0,bed:"",wake:"",skm:false,sks:false});
const emptyKcal=()=>({m1:null,m2:null,m3:null,m4:null});
const loadDay=k=>({...emptyDay(),...LS.get(K.d+k,{})});
const saveDay=(k,v)=>LS.set(K.d+k,v);
const loadKcal=k=>({...emptyKcal(),...LS.get(K.kc+k,{})});
const saveKcal=(k,v)=>LS.set(K.kc+k,v);
const loadWts=()=>LS.get(K.wt,{});
const saveWts=v=>LS.set(K.wt,v);
const loadChat=()=>LS.get(K.chat,[]);
const saveChat=v=>LS.set(K.chat,v);
const loadWrk=k=>LS.get(K.wrk+k,{});
const saveWrk=(k,v)=>LS.set(K.wrk+k,v);
const getKey=()=>LS.get(K.ak,"")||"";
const setKey=v=>LS.set(K.ak,v);
const allKeys=()=>{const r=[];try{for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k?.startsWith(K.d))r.push(k.replace(K.d,""));}}catch{}return r.sort().reverse();};

const calcSleep=(b,w)=>{if(!b||!w)return null;const[bh,bm]=b.split(":").map(Number),[wh,wm]=w.split(":").map(Number);let bed=bh*60+bm+30,wake=wh*60+wm;if(wake<=bed-30)wake+=1440;const d=wake-bed;return d>0?d/60:null;};
const fmtH=h=>{if(!h)return null;const H=Math.floor(h),m=Math.round((h%1)*60);return`${H}h${m>0?m+"m":""}`;};
const score=day=>{
  const meals=MEALS.filter(m=>day.meals[m.id]).length,water=day.water>=3?1:0;
  const sleepH=calcSleep(day.bed,day.wake),sleep=sleepH&&sleepH>=7.5?1:0;
  const skin=(day.skm?1:0)+(day.sks?1:0),total=meals+water+sleep+skin;
  return{total,max:8,pct:Math.round((total/8)*100),meals,water,sleep,sleepH};
};
const mStat=t=>{const now=new Date(),nm=now.getHours()*60+now.getMinutes(),mm=t.h*60+t.m;if(nm<mm-30)return"u";if(nm<mm+90)return"n";return"p";};
const getLast30=()=>{const d=[];for(let i=29;i>=0;i--){const x=new Date();x.setDate(x.getDate()-i);d.push(x.toISOString().split("T")[0]);}return d;};
const getStreak=()=>{let s=0;const td=todayKey();for(let i=0;i<60;i++){const d=new Date();d.setDate(d.getDate()-i);const k=d.toISOString().split("T")[0];const sc=score(loadDay(k));if(k===td&&sc.pct===0)continue;if(sc.pct>=60)s++;else if(i>0)break;}return s;};
const latestWt=wts=>{const e=Object.entries(wts).sort(([a],[b])=>b.localeCompare(a));return e.length?e[0][1]:null;};
const isWeighDay=()=>{const d=new Date().getDay();return d===1||d===4;};

const api=async body=>{
  const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":getKey(),"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify(body)});
  if(!r.ok){const e=await r.json();throw new Error(e.error?.message||"Erreur API");}
  return r.json();
};
const analyzePhoto=async(b64,mime)=>{
  const d=await api({model:"claude-opus-4-5",max_tokens:1000,messages:[{role:"user",content:[{type:"image",source:{type:"base64",media_type:mime,data:b64}},{type:"text",text:'Analyse ce repas, estime les calories. JSON uniquement sans markdown:\n{"total":850,"items":[{"name":"Riz blanc","qty":"250","unit":"g","kcal":325}],"note":"Estimation visuelle"}'}]}]});
  return JSON.parse((d.content?.[0]?.text||"").replace(/```json|```/g,"").trim());
};
const analyzeItems=async items=>{
  const list=items.map(it=>`- ${it.name}: ${it.qty||"?"} ${it.unit||""}`).join("\n");
  const d=await api({model:"claude-opus-4-5",max_tokens:800,messages:[{role:"user",content:`Estime les calories. JSON uniquement sans markdown:\n${list}\n\n{"items":[{"name":"X","qty":"200","unit":"g","kcal":300}],"total":300,"note":"..."}`}]});
  return JSON.parse((d.content?.[0]?.text||"").replace(/```json|```/g,"").trim());
};
const compress=file=>new Promise((res,rej)=>{
  const img=new Image(),url=URL.createObjectURL(file);
  img.onload=()=>{URL.revokeObjectURL(url);const c=document.createElement("canvas");let w=img.width,h=img.height;const M=1200;if(w>M||h>M){const s=Math.min(M/w,M/h);w=Math.round(w*s);h=Math.round(h*s);}c.width=w;c.height=h;c.getContext("2d").drawImage(img,0,0,w,h);res(c.toDataURL("image/jpeg",.82).split(",")[1]);};
  img.onerror=rej;img.src=url;
});

function Setup({onDone}){
  const[k,setK]=useState(""),[ show,setShow]=useState(false),[err,setErr]=useState("");
  const save=()=>{if(!k.trim().startsWith("sk-ant-")){setErr("La clé doit commencer par sk-ant-");return;}setKey(k.trim());onDone();};
  return(
    <div style={{minHeight:"100vh",background:"#080812",display:"flex",alignItems:"center",justifyContent:"center",padding:24,position:"relative",overflow:"hidden"}}>
      <div style={{position:"fixed",top:-150,right:-80,width:400,height:400,borderRadius:"50%",background:"radial-gradient(circle,rgba(240,165,0,.1) 0%,transparent 65%)",pointerEvents:"none"}}/>
      <div className="glass" style={{width:"100%",maxWidth:380,padding:"32px 26px"}}>
        <div style={{fontSize:32,marginBottom:12}}>🔐</div>
        <div style={{fontFamily:"'Syne',sans-serif",fontSize:11,letterSpacing:4,color:A,textTransform:"uppercase",marginBottom:6}}>Configuration</div>
        <div style={{fontFamily:"'Syne',sans-serif",fontSize:22,fontWeight:800,color:TX,marginBottom:8}}>Clé API Anthropic</div>
        <div style={{fontSize:13,color:MU,lineHeight:1.7,marginBottom:20}}>Pour analyser tes repas et accéder au coach IA. Stockée uniquement sur ton appareil.</div>
        <div style={{position:"relative",marginBottom:err?6:16}}>
          <input type={show?"text":"password"} value={k} onChange={e=>{setK(e.target.value);setErr("");}} placeholder="sk-ant-api03-..."
            style={{width:"100%",background:"rgba(255,255,255,.06)",border:`1px solid ${err?RED:BD}`,borderRadius:12,color:TX,fontSize:13,padding:"12px 44px 12px 14px",outline:"none"}}/>
          <button onClick={()=>setShow(s=>!s)} style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",fontSize:16}}>{show?"🙈":"👁️"}</button>
        </div>
        {err&&<div style={{fontSize:11,color:RED,marginBottom:14}}>{err}</div>}
        <div style={{fontSize:11,color:DIM,marginBottom:20,lineHeight:1.6,padding:"10px 12px",background:"rgba(255,255,255,.03)",borderRadius:10}}>
          💡 <strong style={{color:A}}>console.anthropic.com</strong> — API Keys — Create Key
        </div>
        <button onClick={save} style={{width:"100%",padding:14,background:A,border:"none",borderRadius:12,color:"#000",fontFamily:"'Syne',sans-serif",fontSize:14,fontWeight:800,cursor:"pointer"}}>
          Commencer →
        </button>
      </div>
    </div>
  );
}

function App(){
  const[apiKey,setApiKey]=useState(()=>getKey());
  const[tab,setTab]=useState("today");
  const[day,setDay]=useState(()=>loadDay(todayKey()));
  const[kcal,setKcal]=useState(()=>loadKcal(todayKey()));
  const[wts,setWts]=useState(()=>loadWts());
  const[chat,setChat]=useState(()=>loadChat());
  const[wrk,setWrk]=useState(()=>loadWrk(todayKey()));
  const[,tick]=useState(0);
  useEffect(()=>{const iv=setInterval(()=>tick(t=>t+1),30000);return()=>clearInterval(iv);},[]);
  const updDay=s=>{setDay(s);saveDay(todayKey(),s);};
  const updKcal=s=>{setKcal(s);saveKcal(todayKey(),s);};
  const updWts=s=>{setWts(s);saveWts(s);};
  const updChat=s=>{setChat(s);saveChat(s);};
  const updWrk=s=>{setWrk(s);saveWrk(todayKey(),s);};
  const sc=score(day),streak=getStreak(),lw=latestWt(wts);
  const TABS=[{id:"today",ic:"⚡",lb:"TODAY"},{id:"sport",ic:"💪",lb:"SPORT"},{id:"chat",ic:"🤖",lb:"COACH"},{id:"cals",ic:"🔥",lb:"CALS"},{id:"poids",ic:"⚖️",lb:"POIDS"},{id:"history",ic:"📅",lb:"HISTO"},{id:"stats",ic:"📊",lb:"STATS"}];
  if(!apiKey)return<Setup onDone={()=>setApiKey(getKey())}/>;
  return(
    <div style={{minHeight:"100vh",background:"#080812",paddingBottom:88}}>
      <BG/>
      <div style={{position:"relative",zIndex:1}}>
        <div className="section" style={{paddingTop:20,paddingBottom:0,marginBottom:16}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
            <div>
              <div style={{fontFamily:"'Syne',sans-serif",fontSize:10,letterSpacing:4,color:A,textTransform:"uppercase",marginBottom:3}}>{new Date().toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"long"})}</div>
              <div style={{fontFamily:"'Syne',sans-serif",fontSize:26,fontWeight:800,color:TX,letterSpacing:"-0.5px",lineHeight:1}}>Isma <span style={{color:A}}>·</span> Daily</div>
            </div>
            <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:6}}>
              {streak>0&&(
                <div className="glass" style={{padding:"8px 12px",borderRadius:14,textAlign:"center",border:`1px solid ${ABR}`}}>
                  <div style={{fontSize:17,lineHeight:1}}>🔥</div>
                  <div style={{fontFamily:"'Syne',sans-serif",fontSize:16,fontWeight:800,color:A,lineHeight:1.1}}>{streak}</div>
                  <div style={{fontSize:7.5,color:MU,letterSpacing:1.5}}>STREAK</div>
                </div>

function Poids({wts,updWts}){

          <div style={{fontSize:20,color:DIM,marginBottom:4}}>→</div>
          <div><div style={{fontFamily:"'Syne',sans-serif",fontSize:10,color:MU,marginBottom:2}}>Objectif</div><div style={{fontFamily:"'Syne',sans-serif",fontSize:34,fontWeight:800,color:A,lineHeight:1}}>{GOAL}<span style={{fontSize:14,color:MU,fontWeight:400}}> kg</span></div></div>
        </div>
        <div style={{height:7,background:"rgba(255,255,255,.06)",borderRadius:99,overflow:"hidden",marginBottom:8}}>

        </div>

            {hist.map(([,v],i)=>{const x=(i/(hist.length-1))*300,y=80-((v-minW)/(maxW-minW))*80,last=i===hist.length-1;return<g key={i}><circle cx={x} cy={y} r={last?5:3} fill={last?BL:"rgba(96,165,250,.6)"} stroke="#080812" strokeWidth="1.5"/>{last&&<circle cx={x} cy={y} r="9" fill="none" stroke={BL} strokeWidth="1" opacity=".3"/>}</g>;})}

                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

function Stats(){
  const last30=getLast30(),tracked=last30.filter(k=>{const d=loadDay(k);return Object.keys(d.meals).length>0||d.water>0||d.bed;});
  if(!tracked.length)return<Empty icon="📊" text={"Pas encore assez de données.\nReviens dans quelques jours !"}/>;
  const avg=arr=>arr.length?arr.reduce((a,b)=>a+b,0)/arr.length:0;
  const tD=tracked.map(k=>({key:k,day:loadDay(k),...score(loadDay(k))}));
  const aScore=Math.round(avg(tD.map(d=>d.pct))),perfect=tD.filter(d=>d.pct===100).length;
  const aMeals=avg(tD.map(d=>d.meals)).toFixed(1),aWater=avg(tD.map(d=>d.day.water)).toFixed(1);
  const sD=tD.filter(d=>d.sleepH);
  const slOk=Math.round((tD.filter(d=>d.sleep===1).length/tD.length)*100);
  const skinOk=Math.round((tD.filter(d=>d.day.skm&&d.day.sks).length/tD.length)*100);
  const bC=k=>{const d=loadDay(k),s=score(d),has=Object.keys(d.meals).length>0||d.water>0||d.bed;return !has?"rgba(255,255,255,.05)":s.pct===100?GR:s.pct>=70?A:s.pct>=40?"rgba(240,165,0,.45)":"rgba(240,165,0,.18)";};
  const bH=k=>{const d=loadDay(k),s=score(d),has=Object.keys(d.meals).length>0||d.water>0||d.bed;return has?Math.max(4,Math.round((s.pct/100)*60)):4;};
  const sC=k=>{const s=score(loadDay(k));return !s.sleepH?"rgba(255,255,255,.05)":s.sleepH>=7.5?GR:s.sleepH>=6?A:"rgba(240,165,0,.3)";};
  const sH=k=>{const s=score(loadDay(k));return s.sleepH?Math.min(60,Math.round((s.sleepH/10)*60)):4;};
  return(
    <div className="fade">
      <div style={{fontFamily:"'Syne',sans-serif",fontSize:9,letterSpacing:3,color:MU,marginBottom:14,textTransform:"uppercase"}}>30 jours · {tracked.length} tracké{tracked.length>1?"s":""}</div>
      <div style={{display:"flex",gap:10,marginBottom:10}}><SC2 label="Score moyen" value={`${aScore}%`} accent/><SC2 label="Jours parfaits" value={`${perfect}`} sub=" 🔥"/></div>
      <div style={{display:"flex",gap:10,marginBottom:10}}><SC2 label="Repas / jour" value={aMeals} sub="/4"/><SC2 label="Eau / jour" value={`${aWater}L`} sub="/3"/></div>
      <div style={{display:"flex",gap:10,marginBottom:10}}><SC2 label="Sommeil ≥7h30" value={`${slOk}%`}/><SC2 label="Skincare ✓" value={`${skinOk}%`}/></div>
      <ChC title="Score / 30 jours"><Bars days={last30} hFn={bH} cFn={bC}/></ChC>
      {sD.length>0&&<ChC title="Sommeil / 30 jours" right={sD.length?`moy. ${avg(sD.map(d=>d.sleepH)).toFixed(1)}h`:null}><Bars days={last30} hFn={sH} cFn={sC}/><div style={{display:"flex",gap:12,marginTop:8}}>{[[GR,"≥7h30"],[A,"6-7h30"],["rgba(240,165,0,.3)","<6h"]].map(([c,l])=><div key={l} style={{display:"flex",alignItems:"center",gap:4}}><div style={{width:8,height:8,borderRadius:2,background:c}}/><span style={{fontSize:9,color:MU}}>{l}</span></div>)}</div></ChC>}
    </div>
  );
}

function SC2({label,value,sub,accent}){
  return(
    <div className="glass" style={{flex:1,padding:"12px 14px",border:`1px solid ${accent?ABR:BD}`,background:accent?ABG:"rgba(255,255,255,.03)"}}>
      <div style={{fontFamily:"'Syne',sans-serif",fontSize:8,letterSpacing:2,textTransform:"uppercase",color:MU,marginBottom:4}}>{label}</div>
      <div style={{fontFamily:"'Syne',sans-serif",fontSize:22,fontWeight:800,color:accent?A:TX,lineHeight:1}}>{value}{sub&&<span style={{fontSize:12,color:MU,fontWeight:400,marginLeft:2}}>{sub}</span>}</div>
    </div>
  );
}
function ChC({title,right,children}){
  return(
    <div className="glass" style={{padding:"14px",marginBottom:10}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <div style={{fontFamily:"'Syne',sans-serif",fontSize:9,letterSpacing:2,color:MU,textTransform:"uppercase"}}>{title}</div>
        {right&&<span style={{fontFamily:"'Syne',sans-serif",fontSize:11,fontWeight:700,color:A}}>{right}</span>}
      </div>
      {children}
      <div style={{display:"flex",justifyContent:"space-between",marginTop:6}}><span style={{fontSize:9,color:DIM}}>J−30</span><span style={{fontSize:9,color:DIM}}>Aujourd'hui</span></div>
    </div>
  );
}
function Bars({days,hFn,cFn}){
  return(
    <div style={{display:"flex",alignItems:"flex-end",gap:3,height:60}}>
      {days.map(k=><div key={k} style={{flex:1,display:"flex",alignItems:"flex-end",height:60}}><div style={{width:"100%",height:`${hFn(k)}px`,borderRadius:"3px 3px 0 0",background:cFn(k),transition:"height .4s"}}/></div>)}
    </div>
  );
}
function Empty({icon,text}){
  return(
    <div style={{textAlign:"center",padding:"60px 16px",color:MU}}>
      <div style={{fontSize:44,marginBottom:14}}>{icon}</div>
      <div style={{fontFamily:"'Syne',sans-serif",fontSize:14,lineHeight:1.9,whiteSpace:"pre-line"}}>{text}</div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>
</body>
</html>
